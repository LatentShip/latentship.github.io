<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:20px;display:flex;flex-direction:column;gap:12px;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{display:flex;flex-direction:column;gap:6px;flex:1;min-width:72px;}
.chip{height:52px;border-radius:10px;border:1px solid rgba(18,32,24,0.1);}
.label{font-size:11px;font-weight:800;color:#3d4f44;}
.hex{font-size:10px;font-weight:700;color:#6d7d73;}
.section-label{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#3a6422;margin-bottom:2px;}
</style></head><body>
<div class="section-label">Brand Greens</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#edf8e3;"></div><div class="label">brand-50</div><div class="hex">#edf8e3</div></div>
  <div class="swatch"><div class="chip" style="background:#d9efc5;"></div><div class="label">brand-100</div><div class="hex">#d9efc5</div></div>
  <div class="swatch"><div class="chip" style="background:#bde092;"></div><div class="label">brand-200</div><div class="hex">#bde092</div></div>
  <div class="swatch"><div class="chip" style="background:#6fb23a;"></div><div class="label">brand-400</div><div class="hex">#6fb23a</div></div>
  <div class="swatch"><div class="chip" style="background:#5b9830;"></div><div class="label">brand-500</div><div class="hex">#5b9830</div></div>
  <div class="swatch"><div class="chip" style="background:#3a6422;"></div><div class="label">brand-700</div><div class="hex">#3a6422</div></div>
</div>
<div class="section-label" style="margin-top:4px;">Usage Contexts</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#6fb23a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#112018;padding:0 8px;white-space:nowrap;">Nav CTA</div></div>
  <div class="swatch"><div class="chip" style="background:linear-gradient(145deg,#deefc8,#d2e8b7,#f4faeb);"></div><div class="label">Roadmap bg</div></div>
  <div class="swatch"><div class="chip" style="background:radial-gradient(circle at 12% 12%, rgba(139,200,75,0.28) 0%, transparent 36%), linear-gradient(150deg, #152019 0%, #0f1813 55%, #111c16 100%);"></div><div class="label">Dark panel</div></div>
</div>
</body></html>
