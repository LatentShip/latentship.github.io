<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Sora:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:20px;display:flex;flex-direction:column;gap:12px;}
.dark-panel{border-radius:18px;border:1px solid rgba(144,203,83,0.24);background:radial-gradient(circle at 12% 12%, rgba(139,200,75,0.28) 0%, transparent 36%), linear-gradient(150deg, #152019 0%, #0f1813 55%, #111c16 100%);padding:20px;display:flex;flex-direction:column;gap:10px;}
.section-label{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#3a6422;margin-bottom:2px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.swatch{display:flex;flex-direction:column;gap:5px;min-width:80px;}
.chip{height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);}
.label{font-size:10px;font-weight:800;color:#d4dfd1;}
.hex{font-size:9px;color:#7a9c81;}
</style></head><body>
<div class="section-label">Dark Panel Surface</div>
<div class="dark-panel">
  <div style="font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:#f4f8f2;line-height:1.12;">Scoped proof for a critical flow,<br>then production-ready delivery.</div>
  <div style="font-size:12px;color:#d4dfd1;font-weight:700;">POC → MVP → Launch + Iterate</div>
  <div class="row" style="margin-top:4px;">
    <span style="color:#b1e17b;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;">Week 1</span>
    <span style="color:#e7eee4;font-size:12px;">Scoped proof for a critical workflow</span>
  </div>
  <div class="row">
    <span style="color:#b1e17b;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;">Weeks 2+</span>
    <span style="color:#e7eee4;font-size:12px;">MVP build with production foundations</span>
  </div>
  <div style="margin-top:8px;display:flex;gap:6px;align-items:flex-end;">
    <div style="width:44px;height:44%;background:#b8dd8f;border-radius:6px 6px 0 0;"></div>
    <div style="width:44px;height:62%;background:#91c95d;border-radius:6px 6px 0 0;"></div>
    <div style="width:44px;height:80px;background:#6aac38;border-radius:6px 6px 0 0;"></div>
  </div>
</div>
<div class="row" style="gap:8px;">
  <div class="swatch"><div class="chip" style="background:#f4f8f2;"></div><div class="label">dark-fg</div><div class="hex">#f4f8f2</div></div>
  <div class="swatch"><div class="chip" style="background:#d4dfd1;"></div><div class="label">fg-soft</div><div class="hex">#d4dfd1</div></div>
  <div class="swatch"><div class="chip" style="background:#b1e17b;"></div><div class="label">timeline label</div><div class="hex">#b1e17b</div></div>
  <div class="swatch"><div class="chip" style="background:#152019;"></div><div class="label">dark-from</div><div class="hex">#152019</div></div>
  <div class="swatch"><div class="chip" style="background:#0f1813;"></div><div class="label">dark-mid</div><div class="hex">#0f1813</div></div>
</div>
</body></html>
