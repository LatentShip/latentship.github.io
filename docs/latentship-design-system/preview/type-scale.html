<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Sora:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:20px;display:flex;flex-direction:column;gap:0;}
.row{display:grid;grid-template-columns:80px 1fr;gap:8px;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(18,32,24,0.08);}
.row:last-child{border-bottom:none;}
.meta{font-size:10px;font-weight:800;color:#6d7d73;letter-spacing:0.04em;}
</style></head><body>
<div class="row">
  <div class="meta">hero<br>clamp(36–64px)</div>
  <div style="font-family:'Sora',sans-serif;font-size:clamp(32px,4vw,52px);font-weight:700;line-height:1.1;letter-spacing:-0.03em;color:#132019;">Ship faster.</div>
</div>
<div class="row">
  <div class="meta">xl<br>clamp(28–42px)</div>
  <div style="font-family:'Sora',sans-serif;font-size:clamp(24px,3vw,36px);font-weight:700;line-height:1.12;letter-spacing:-0.03em;color:#132019;">Why teams trust us.</div>
</div>
<div class="row">
  <div class="meta">lg / 20px</div>
  <div style="font-family:'Sora',sans-serif;font-size:20px;font-weight:700;line-height:1.2;color:#132019;">AI where it helps</div>
</div>
<div class="row">
  <div class="meta">md / 16px</div>
  <div style="font-size:16px;font-weight:400;line-height:1.55;color:#3d4f44;">We map business friction into practical AI systems.</div>
</div>
<div class="row">
  <div class="meta">sm / 14px</div>
  <div style="font-size:14px;font-weight:700;color:#213228;">Book a 15-min scoping call</div>
</div>
<div class="row">
  <div class="meta">xs / 12px</div>
  <div style="font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#3a6422;">AI-native product + engineering team</div>
</div>
</body></html>
