<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:20px;}
.grid{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{background:#6fb23a;border-radius:3px;width:28px;}
.token{font-size:9px;font-weight:800;color:#3d4f44;text-align:center;}
.val{font-size:9px;color:#6d7d73;text-align:center;}
.section-label{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#3a6422;margin-bottom:10px;}
</style></head><body>
<div class="section-label">Spacing Scale — 4px base grid</div>
<div class="grid">
  <div class="item"><div class="bar" style="height:4px;opacity:0.3;"></div><div class="token">space-1</div><div class="val">4px</div></div>
  <div class="item"><div class="bar" style="height:8px;opacity:0.4;"></div><div class="token">space-2</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="height:12px;opacity:0.5;"></div><div class="token">space-3</div><div class="val">12px</div></div>
  <div class="item"><div class="bar" style="height:16px;opacity:0.6;"></div><div class="token">space-4</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="height:20px;opacity:0.65;"></div><div class="token">space-5</div><div class="val">20px</div></div>
  <div class="item"><div class="bar" style="height:24px;opacity:0.7;"></div><div class="token">space-6</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="height:28px;opacity:0.75;"></div><div class="token">space-7</div><div class="val">28px</div></div>
  <div class="item"><div class="bar" style="height:32px;opacity:0.8;"></div><div class="token">space-8</div><div class="val">32px</div></div>
  <div class="item"><div class="bar" style="height:40px;opacity:0.85;"></div><div class="token">space-10</div><div class="val">40px</div></div>
  <div class="item"><div class="bar" style="height:48px;opacity:0.9;"></div><div class="token">space-12</div><div class="val">48px</div></div>
  <div class="item"><div class="bar" style="height:64px;"></div><div class="token">space-16</div><div class="val">64px</div></div>
</div>
</body></html>
