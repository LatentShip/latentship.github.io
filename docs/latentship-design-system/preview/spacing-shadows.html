<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:24px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;}
.item{display:flex;flex-direction:column;align-items:center;gap:10px;}
.card{width:100px;height:64px;background:color-mix(in srgb,white 70%,#eff8e8 30%);border:1px solid rgba(18,32,24,0.12);border-radius:18px;}
.token{font-size:10px;font-weight:800;color:#3d4f44;}
.val{font-size:9px;color:#6d7d73;text-align:center;max-width:110px;line-height:1.4;}
</style></head><body>
<div class="item">
  <div class="card" style="box-shadow:0 10px 22px rgba(26,42,29,0.07);"></div>
  <div class="token">shadow-sm</div>
  <div class="val">0 10px 22px<br>rgba(26,42,29,.07)</div>
</div>
<div class="item">
  <div class="card" style="box-shadow:0 20px 40px rgba(21,35,26,0.09);"></div>
  <div class="token">shadow-md</div>
  <div class="val">0 20px 40px<br>rgba(21,35,26,.09)</div>
</div>
<div class="item">
  <div class="card" style="box-shadow:0 30px 64px rgba(18,28,22,0.12);"></div>
  <div class="token">shadow-lg</div>
  <div class="val">0 30px 64px<br>rgba(18,28,22,.12)</div>
</div>
<div class="item">
  <div class="card" style="box-shadow:0 30px 64px rgba(18,28,22,0.12);border:1px solid rgba(144,203,83,0.24);background:radial-gradient(circle at 12% 12%,rgba(139,200,75,0.28) 0%,transparent 36%),linear-gradient(150deg,#152019 0%,#0f1813 55%,#111c16 100%);"></div>
  <div class="token">shadow-lg dark</div>
  <div class="val">Hero card variant</div>
</div>
</body></html>
