<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:20px;display:flex;flex-direction:column;gap:12px;}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

<div class="section-label">Tag Chips (default)</div>
<div class="row">
  <span style="border:1px solid rgba(10,16,18,0.14);border-radius:999px;font-size:11px;padding:4px 9px;background:#edf7e3;color:#33483e;font-weight:700;">AI Systems</span>

  <span style="border:1px solid rgba(10,16,18,0.14);border-radius:999px;font-size:11px;padding:4px 9px;background:#edf7e3;color:#33483e;font-weight:700;">Operational Platforms</span>
  <span style="border:1px solid rgba(10,16,18,0.14);border-radius:999px;font-size:11px;padding:4px 9px;background:#edf7e3;color:#33483e;font-weight:700;">AgriTech</span>
</div>
<div class="divider"></div>

<div class="row">
  <span style="border-radius:999px;border:1px solid rgba(18,32,24,0.12);background:color-mix(in srgb,white 82%,#edf8e3 18%);padding:5px 10px;font-size:11px;font-weight:700;color:#36493f;">AI Systems</span>
  <span style="border-radius:999px;border:1px solid rgba(18,32,24,0.12);background:color-mix(in srgb,white 82%,#edf8e3 18%);padding:5px 10px;font-size:11px;font-weight:700;color:#36493f;">Agentic Workflows</span>
  <span style="border-radius:999px;border:1px solid rgba(18,32,24,0.12);background:color-mix(in srgb,white 82%,#edf8e3 18%);padding:5px 10px;font-size:11px;font-weight:700;color:#36493f;">FinTech</span>
</div>
<div class="divider"></div>

  <span style="border:1px solid rgba(31,105,214,0.25);background:#e4efff;color:#1f69d6;border-radius:999px;font-size:11px;font-weight:700;padding:4px 10px;">Info</span>
