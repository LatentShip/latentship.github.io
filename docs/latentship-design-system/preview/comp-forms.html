<!doctype html><html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f3f8f1;padding:16px;display:flex;flex-direction:column;gap:10px;}
.section-label{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#6d7d73;margin-bottom:2px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-label{font-size:13px;font-weight:700;color:#23362c;}
.input{width:100%;border-radius:12px;border:1px solid rgba(18,32,24,0.16);background:#fbfef9;color:#0f1518;font-family:inherit;font-size:15px;padding:9px 11px;outline:none;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.choice{border:1px solid rgba(10,16,18,0.15);border-radius:12px;background:#f9fcf5;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#132019;font-weight:600;cursor:pointer;}
.choice.selected{border-color:#77b83d;background:#eef7e2;}
.progress-bar{width:100%;height:9px;border-radius:999px;overflow:hidden;background:#e2ead7;}
.progress-fill{height:100%;width:40%;border-radius:999px;background:linear-gradient(90deg,#71af35,#98cf5b);}
</style></head><body>
<div class="section-label">Text Inputs</div>
<div class="row" style="align-items:flex-start;">
  <div class="field" style="flex:1;min-width:140px;">
    <div class="field-label">Name</div>
    <input class="input" value="Hariharan R." type="text" readonly/>
  </div>
  <div class="field" style="flex:1;min-width:140px;">
    <div class="field-label">Email</div>
    <input class="input" value="hari@latentship.com" type="text" readonly style="border-color:rgba(44,123,229,0.6);box-shadow:0 0 0 4px rgba(228,239,255,0.9);" />
  </div>
</div>
<div class="field">
  <div class="field-label">Describe the workflow <span style="font-size:11px;color:#6d7d73;font-weight:600;">(optional)</span></div>
  <textarea class="input" style="min-height:64px;resize:none;" readonly>We have a messy intake process that involves...</textarea>
</div>
<div class="section-label" style="margin-top:4px;">Choice Cards</div>
<div style="display:flex;flex-direction:column;gap:6px;">
  <div class="choice selected"><input type="radio" style="margin-top:2px;width:16px;height:16px;accent-color:#5b9830;" checked readonly/><span>Automating internal ops workflows</span></div>
  <div class="choice"><input type="radio" style="margin-top:2px;width:16px;height:16px;accent-color:#5b9830;" readonly/><span>Building a client-facing AI product</span></div>
</div>
<div class="section-label" style="margin-top:4px;">Progress Bar</div>
<div style="display:flex;flex-direction:column;gap:5px;">
  <div class="progress-bar"><div class="progress-fill"></div></div>
  <div style="font-size:12px;font-weight:700;color:#4d5b56;">Step 2 of 4</div>
</div>
</body></html>
