<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DeepReflekt case snapshot by LatentShip." />
    <title>LatentShip | DeepReflekt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>
  <body data-page="project" data-project-slug="deepreflekt">
    <header class="site-header">
      <div class="container nav-shell">
        <a href="../../" class="brand">
          <svg class="brand-mark" viewBox="0 0 28 28" aria-hidden="true" focusable="false">
            <circle cx="14" cy="14" r="13" fill="#eef7e2" stroke="#b6d98a" />
            <path d="M16.7 6.9c-2.6.6-4.7 2.7-5.3 5.3l-2.8 2.8 2.4 2.4 2.8-2.8c2.6-.6 4.7-2.7 5.3-5.3l.5-2.2-2.2.5Z" fill="#79ba37" />
            <circle cx="15.8" cy="10.4" r="1.2" fill="#0f1518" />
            <path d="M9.2 17.4 8 20l2.6-1.2z" fill="#5f9b2f" />
          </svg>
          <span class="brand-text">LatentShip</span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="../../">Home</a>
          <a href="../../work/" class="active">Our Work</a>
          <a href="../../about/">About Us</a>
        </nav>
        <a href="../../get-started/" class="nav-cta">Book a 15-min scoping call</a>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container panel project-shell" data-reveal>
          <a class="back-link" href="../"><- Back to work</a>
          <p class="project-meta" id="project-industry"></p>
          <h1 id="project-title"></h1>
          <p class="lead" id="project-summary"></p>

          <div class="project-detail-grid">
            <div id="project-preview" class="project-preview large"></div>
            <article class="project-side-card">
              <h2>Scope snapshot</h2>
              <p class="duration-line">Sprint length: <span id="project-duration"></span></p>
              <div id="project-tags" class="chips"></div>
              <h3>Deliverables</h3>
              <ul id="project-deliverables"></ul>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container" data-reveal>
          <div class="section-head inline-head">
            <h2>Related projects</h2>
            <a class="text-link-cta" href="../">View all -></a>
          </div>
          <div id="related-project-grid" class="project-grid" data-project-link-prefix="../"></div>
        </div>
      </section>
    </main>

    <script src="../../js/content.js" defer></script>
    <script src="../../js/main.js" defer></script>
  </body>
</html>
